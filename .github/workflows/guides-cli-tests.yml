name: "Guides CLI Tests"

on:
  push:
    paths:
      - scripts/guides-cli.py
      - scripts/test-guides-cli.py
      - .github/workflows/guides-cli-tests.yml
  pull_request:
    paths:
      - scripts/guides-cli.py
      - scripts/test-guides-cli.py
      - .github/workflows/guides-cli-tests.yml

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12", "3.x"]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit and integration tests
        run: python scripts/test-guides-cli.py -v

      - name: Verify CLI help output
        run: python scripts/guides-cli.py --help

      - name: Verify validate command against real data
        run: python scripts/guides-cli.py validate
